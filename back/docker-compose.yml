services:
  cassandra-1:
    image: cassandra:5.0
    container_name: cassandra-1
    environment:
      - CASSANDRA_CLUSTER_NAME=myshortlinks-cluster
      - CASSANDRA_SEEDS=cassandra-1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  cassandra-2:
    image: cassandra:5.0
    container_name: cassandra-2
    environment:
      - CASSANDRA_CLUSTER_NAME=myshortlinks-cluster
      - CASSANDRA_SEEDS=cassandra-1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    depends_on:
      cassandra-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  cassandra-3:
    image: cassandra:5.0
    container_name: cassandra-3
    environment:
      - CASSANDRA_CLUSTER_NAME=myshortlinks-cluster
      - CASSANDRA_SEEDS=cassandra-1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    depends_on:
      cassandra-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  cassandra-4:
    image: cassandra:5.0
    container_name: cassandra-4
    environment:
      - CASSANDRA_CLUSTER_NAME=myshortlinks-cluster
      - CASSANDRA_SEEDS=cassandra-1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    depends_on:
      cassandra-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  redis-master:
    image: redis:7.2-alpine
    container_name: redis-master
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-replica:
    image: redis:7.2-alpine
    container_name: redis-replica
    command: redis-server --appendonly yes --appendfsync everysec --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentinel-1:
    image: redis:7.2-alpine
    container_name: sentinel-1
    command: sh -c "echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf && echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf && echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf && echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf && echo 'sentinel resolve-hostnames yes' >> /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy

  sentinel-2:
    image: redis:7.2-alpine
    container_name: sentinel-2
    command: sh -c "echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf && echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf && echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf && echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf && echo 'sentinel resolve-hostnames yes' >> /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy

  sentinel-3:
    image: redis:7.2-alpine
    container_name: sentinel-3
    command: sh -c "echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf && echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf && echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf && echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf && echo 'sentinel resolve-hostnames yes' >> /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myshortlinks-app
    ports:
      - "3000:8080"
    environment:
      - CASSANDRA_HOSTS=cassandra-1
      - REDIS_SENTINELS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_MASTER_NAME=mymaster
      - BASE62_SECRET=sua-chave-secreta-aqui
    depends_on:
      cassandra-1:
        condition: service_healthy
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
